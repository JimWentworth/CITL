```yaml name=.github/workflows/auto-add-css.yml
name: Auto-Add CSS Link to HTML Files

on:
  push:
    paths:
      - 'ai-fluency/**'

jobs:
  add-css-link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add stylesheet links to HTML files
        run: |
          for file in ai-fluency/*.html; do
            if [ -f "$file" ]; then
              if ! grep -q 'href="styles.css"' "$file"; then
                # Insert before </head>
                sed -i 's#</head>#    <link rel="stylesheet" href="styles.css">\n</head>#g' "$file"
                echo "Added stylesheet to: $file"
              else
                echo "Stylesheet already present in: $file"
              fi
            fi
          done

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ai-fluency/*.html
          git commit -m "chore: auto-add stylesheet link to HTML files" || echo "No changes to commit"
          git push || echo "Nothing to push"
```
- ✅ Uses `git config` to set commit author

Replace the contents of your `.github/workflows/auto-add-css.yml` with this and try uploading a new HTML file again. This should work now! 🚀
