```yaml name=.github/workflows/auto-add-css.yml
name: Auto-Add CSS Link to HTML Files

on:
  push:
    paths:
      - 'ai-fluency/*.html'

jobs:
  add-css-link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run add-stylesheet-link script
        run: node add-stylesheet-link.js

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-add stylesheet link to HTML files"
          branch: ${{ github.ref }}
```
