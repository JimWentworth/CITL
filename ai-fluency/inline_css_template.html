<html><head>
    <meta charset="UTF-8">
    <title>NotebookLM Module</title>
	<style>
    body {
        margin: 0;
        padding: 24px;
        background: #f4f7fb;
        font-family: Arial, Helvetica, sans-serif;
        color: #243447;
        line-height: 1.6;
    }

    #dp-wrapper {
        max-width: 1000px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
        padding: 28px;
    }

    #dp-wrapper p {
        margin: 0 0 1rem 0;
    }

    #dp-wrapper a {
        color: #0b5ed7;
        text-decoration: none;
        font-weight: 600;
    }

    #dp-wrapper a:hover {
        text-decoration: underline;
    }

    .dp-embed-wrapper {
        margin: 1.5rem 0 2rem 0;
        text-align: center;
    }

    .dp-embed-wrapper iframe {
        max-width: 100%;
        border-radius: 12px;
    }

    .dp-panel-heading {
        background: #eaf1fb;
        border-left: 5px solid #0b5ed7;
        padding: 14px 16px;
        font-size: 1.2rem;
        font-weight: 700;
        border-radius: 8px;
        margin-bottom: 1rem;
    }

    .dp-panel-content {
        background: #fcfdff;
        border: 1px solid #e3eaf3;
        border-radius: 10px;
        padding: 20px;
    }

    .step-section {
        margin-bottom: 2rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid #d9e2ec;
    }

    .step-header {
        margin-bottom: 0.75rem;
    }

    .step-title {
        font-size: 1.2rem;
        color: #102a43;
        line-height: 1.4;
    }

    .note-box {
        background: #f6f9fc;
        border-left: 4px solid #3b82f6;
        padding: 14px 16px;
        border-radius: 8px;
        margin: 1rem 0;
    }

    .note-label {
        font-weight: 700;
        color: #174ea6;
        margin-bottom: 0.4rem;
    }

    ul, ol {
        margin: 0 0 1rem 1.5rem;
        padding-left: 1rem;
    }

    li {
        margin-bottom: 0.5rem;
    }

    .studio-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        margin-top: 1rem;
    }

    .studio-card {
        background: #ffffff;
        border: 1px solid #dbe4ee;
        border-radius: 10px;
        padding: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .studio-card p:last-child {
        margin-bottom: 0;
    }

    .chip {
        display: inline-block;
        background: #e8f0fe;
        color: #174ea6;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 0.75rem;
        vertical-align: middle;
    }

    hr {
        border: 0;
        border-top: 1px solid #d9e2ec;
        margin: 1.5rem 0;
    }

    @media (max-width: 700px) {
        body {
            padding: 12px;
        }

        #dp-wrapper {
            padding: 18px;
        }
    }
</style>
</head>
	<body>
<!-- Content goes here -->		

<footer><div class="note-box">Last updated March 2026</div></footer>
	</body>
    </html>
